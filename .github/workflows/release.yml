name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Validate release tag
        run: |
          VERSION="$(deno eval "const p = JSON.parse(await Deno.readTextFile('package.json')); console.log(p.version)")"
          if [ "v${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version v${VERSION}" >&2
            exit 1
          fi

      - name: Cache dependencies
        run: deno task cache

      - name: E2E
        run: deno task e2e

      - name: Compile daemon
        run: |
          deno compile \
            -A \
            --node-modules-dir=auto \
            --target ${{ matrix.target }} \
            -o pi-agent-daemon-${{ matrix.target }} \
            src/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: pi-agent-daemon-${{ matrix.target }}
          path: pi-agent-daemon-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: pi-agent-daemon-*
